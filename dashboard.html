<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        input, textarea, select, button { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        .task { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .delete { background: #dc3545; }
        .logout { background: #6c757d; float: right; width: auto; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <button class="logout" onclick="logout()">Logout</button>
    <h2>Task Dashboard</h2>
    <div id="userInfo"></div>

    <h3>Create New Task</h3>
    <input type="text" id="taskTitle" placeholder="Title">
    <textarea id="taskDesc" placeholder="Description"></textarea>
    <select id="taskStatus">
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="completed">Completed</option>
    </select>
    <button onclick="createTask()">Create Task</button>

    <h3>My Tasks</h3>
    <div id="tasksList"></div>
    <div id="message"></div>

    <script>
        const API = 'http://localhost:5000';
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) window.location.href = 'index.html';
        document.getElementById('userInfo').innerHTML = `<h4>Welcome ${user.name} (${user.role})</h4>`;

        async function loadTasks() {
            const res = await fetch(`${API}/tasks`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.success) displayTasks(data.tasks);
        }

        function displayTasks(tasks) {
            const container = document.getElementById('tasksList');
            container.innerHTML = '';
            tasks.forEach(task => {
                const div = document.createElement('div');
                div.className = 'task';
                div.innerHTML = `
                    <h4>${task.title}</h4>
                    <p>${task.description}</p>
                    <p>Status: ${task.status}</p>
                    <button onclick="updateTask('${task._id}')">Update</button>
                    <button class="delete" onclick="deleteTask('${task._id}')">Delete</button>
                `;
                container.appendChild(div);
            });
        }

        async function createTask() {
            const title = document.getElementById('taskTitle').value;
            const description = document.getElementById('taskDesc').value;
            const status = document.getElementById('taskStatus').value;
            const res = await fetch(`${API}/tasks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ title, description, status })
            });
            const data = await res.json();
            if (data.success) {
                showMessage('Task created!', 'success');
                loadTasks();
                document.getElementById('taskTitle').value = '';
                document.getElementById('taskDesc').value = '';
            } else showMessage(data.message, 'error');
        }

        async function updateTask(id) {
            const newStatus = prompt('Enter status (pending/in-progress/completed):');
            if (newStatus) {
                await fetch(`${API}/tasks/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ status: newStatus })
                });
                loadTasks();
            }
        }

        async function deleteTask(id) {
            if (confirm('Delete this task?')) {
                await fetch(`${API}/tasks/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadTasks();
            }
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        function showMessage(msg, type) {
            const div = document.getElementById('message');
            div.textContent = msg;
            div.className = type;
            setTimeout(() => div.textContent = '', 3000);
        }
        loadTasks();
    </script>
</body>
</html>
